<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://discord.com https://lemonsqueezy.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="no-referrer">
    
    <!-- Anti-scraping & Anti-indexing -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">
    
    <!-- Mobile Screenshot Prevention -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    
    <!-- Prevent iOS Screenshot Detection -->
    <meta name="apple-mobile-web-app-title" content="Secure Scanner">
    
    <!-- Disable context menu and text selection (anti-copy) -->
    <style>
      /* Global security styles */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Allow selection for input fields only */
      input, textarea {
        -webkit-user-select: auto;
        -moz-user-select: auto;
        -ms-user-select: auto;
        user-select: auto;
      }
      
      /* Prevent image dragging */
      img {
        pointer-events: none;
        -webkit-user-drag: none;
        -khtml-user-drag: none;
        -moz-user-drag: none;
        -o-user-drag: none;
        user-drag: none;
      }
      
      /* Prevent text highlight on mobile */
      body {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      
      /* Secure content watermark */
      .secure-content::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
        opacity: 0.01;
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 100px,
          rgba(255, 255, 255, 0.02) 100px,
          rgba(255, 255, 255, 0.02) 200px
        );
      }
      
      /* Security overlay styles - blocks all interaction when active */
      .security-overlay {
        pointer-events: all;
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
      }
      
      /* Black screen overlay when tab is hidden */
      .security-blackout-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000000;
        opacity: 1;
        z-index: 999999;
        pointer-events: all;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      /* Heavy blur overlay - catches Snipping Tool */
      .security-blur-overlay-heavy {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000000;
        opacity: 1;
        z-index: 999998;
        pointer-events: all;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: none;
      }
      
      /* Warning toast animation */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .warning-toast {
        animation: fadeIn 0.3s ease-in-out;
      }
      
      /* Watermark pattern - diagonal stripes */
      .watermark-pattern {
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 100px,
          rgba(255,255,255,0.1) 100px,
          rgba(255,255,255,0.1) 101px
        );
        background-size: 141px 141px;
      }
      
      /* Watermark overlay */
      .watermark-overlay {
        background: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 200px,
          rgba(255, 255, 255, 0.02) 200px,
          rgba(255, 255, 255, 0.02) 201px
        );
      }
      
      /* Secure content with user-select control */
      .secure-content-high,
      .secure-content-maximum {
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      
      .secure-content-standard {
        -webkit-user-select: auto;
        -moz-user-select: auto;
        user-select: auto;
      }
    </style>
    
    <title>pulledout</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Anti-debugging -->
    <script>
      // Detect DevTools
      (function() {
        const devtools = {
          isOpen: false,
          orientation: undefined
        };
        
        const threshold = 160;
        const emitEvent = (isOpen, orientation) => {
          window.dispatchEvent(new CustomEvent('devtoolschange', {
            detail: { isOpen, orientation }
          }));
        };
        
        setInterval(() => {
          const widthThreshold = window.outerWidth - window.innerWidth > threshold;
          const heightThreshold = window.outerHeight - window.innerHeight > threshold;
          const orientation = widthThreshold ? 'vertical' : 'horizontal';
          
          if (!(heightThreshold && widthThreshold) &&
              ((window.Firebug && window.Firebug.chrome && window.Firebug.chrome.isInitialized) || widthThreshold || heightThreshold)) {
            if (!devtools.isOpen || devtools.orientation !== orientation) {
              emitEvent(true, orientation);
              // Optionally redirect or show warning
              console.log('DevTools detected - monitoring enabled');
            }
            devtools.isOpen = true;
            devtools.orientation = orientation;
          } else {
            if (devtools.isOpen) {
              emitEvent(false, undefined);
            }
            devtools.isOpen = false;
            devtools.orientation = undefined;
          }
        }, 500);
        
        // Disable right-click
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Disable common shortcuts
        document.addEventListener('keydown', e => {
          // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+S, Ctrl+Shift+C
          if (e.keyCode === 123 || 
              (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) ||
              (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83))) {
            e.preventDefault();
            return false;
          }
        });
      })();
    </script>
  </body>
</html>
