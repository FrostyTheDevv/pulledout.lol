# Nixpacks configuration for Railway
[phases.setup]
nixPkgs = ["python313", "chromium", "chromedriver"]

[phases.install]
cmds = ["python3 -m pip install --upgrade pip", "python3 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "gunicorn web_server:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120"
