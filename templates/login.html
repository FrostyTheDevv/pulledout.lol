<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="description" content="pulledout.lol">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pulledout.lol/login">
    <meta property="og:title" content="pulledout.lol">
    <meta property="og:description" content="pulledout.lol">
    <meta property="og:site_name" content="pulledout.lol">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="pulledout.lol">
    <meta name="twitter:description" content="pulledout.lol">
    
    <link rel="canonical" href="https://pulledout.lol/login">
    <link rel="icon" type="image/png" href="/static/pulledout.png?v=2">
    <link rel="apple-touch-icon" href="/static/pulledout.png?v=2">
    <title>pulledout - login</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box fade-in">
            <div class="auth-header">
                <img src="/static/pulledout.png?v=2" alt="PULLEDOUT.LOL" class="logo-img">
                <h1>PULLEDOUT.LOL</h1>
            </div>
            
            <form id="loginForm" class="auth-form" method="POST" action="/api/auth/login" autocomplete="on">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="/signup">Sign up here</a></p>
            </div>
        </div>
    </div>
    
    <script src="/static/js/login.js"></script>
</body>
</html>
