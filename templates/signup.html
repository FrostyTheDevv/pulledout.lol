<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="description" content="pulledout.lol">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pulledout.lol/signup">
    <meta property="og:title" content="pulledout.lol">
    <meta property="og:description" content="pulledout.lol">
    <meta property="og:site_name" content="pulledout.lol">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="pulledout.lol">
    <meta name="twitter:description" content="pulledout.lol">
    
    <link rel="canonical" href="https://pulledout.lol/signup">
    <link rel="icon" type="image/png" href="/static/pulledout.png?v=2">
    <link rel="apple-touch-icon" href="/static/pulledout.png?v=2">
    <title>pulledout - signup</title>
    <link rel="stylesheet" href="/static/css/auth.css" integrity="sha384-HeRyIIV8KqqtmfP4eBBnUY3ts6vQ+x4F97H1OvbnmxeB6rsmNOWYm1i/WLcsozNH" crossorigin="anonymous">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box fade-in">
            <div class="auth-header">
                <img src="/static/pulledout.png?v=2" alt="PULLEDOUT.LOL" class="logo-img">
                <h1>Create Account</h1>
                <p>PULLEDOUT.LOL</p>
            </div>
            
            <form id="signupForm" class="auth-form" method="POST" action="/api/auth/signup" autocomplete="on">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" 
                           placeholder="Choose a username" minlength="3" maxlength="30">
                    <span class="field-hint">3-30 characters, letters, numbers, - and _ only</span>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" 
                           placeholder="Choose a strong password" minlength="8">
                    <span class="field-hint">Minimum 8 characters</span>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" 
                           placeholder="Re-enter your password">
                </div>
                
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="termsCheckbox" required>
                        I agree to the&nbsp;<a href="/terms" target="_blank">Terms of Service</a>&nbsp;&nbsp;and&nbsp;&nbsp;<a href="/privacy" target="_blank">Privacy Policy</a>
                    </label>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <button type="submit" class="btn-primary" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Login here</a></p>
            </div>
        </div>
    </div>
    
    <script src="/static/js/signup.js"></script>
</body>
</html>
