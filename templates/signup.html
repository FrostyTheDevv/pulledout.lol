<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ form_state }}">
    <meta name="csrf-param" content="csrf_token">
    <meta name="csrf-protection" content="enabled">
    <meta name="description" content="pulledout.lol">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pulledout.lol/signup">
    <meta property="og:title" content="pulledout.lol">
    <meta property="og:description" content="pulledout.lol">
    <meta property="og:site_name" content="pulledout.lol">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="pulledout.lol">
    <meta name="twitter:description" content="pulledout.lol">
    
    <link rel="canonical" href="https://pulledout.lol/signup">
    <link rel="icon" type="image/png" href="/static/pulledout.png?v=2">
    <link rel="apple-touch-icon" href="/static/pulledout.png?v=2">
    <title>pulledout - signup</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box fade-in">
            <div class="auth-header">
                <img src="/static/pulledout.png?v=2" alt="PULLEDOUT.LOL" class="logo-img">
                <h1>Create Account</h1>
                <p>PULLEDOUT.LOL</p>
            </div>
            
            <!-- Discord OAuth Signup -->
            <div class="auth-form">
                <div class="paid-notice">
                    <div class="notice-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="payment-icon">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                            <line x1="1" y1="10" x2="23" y2="10"></line>
                        </svg>
                        <strong>One-Time Payment Required</strong>
                    </div>
                    <p>After signing up via Discord, you'll be directed to checkout. <a href="/pay">View pricing</a></p>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <button type="button" class="btn-primary discord-btn" id="discordSignupBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="discord-icon">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                    </svg>
                    <span class="btn-text">Sign up with Discord</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
                
                <div class="auth-footer">
                    <p class="existing-user-text">Already have an account? <a href="/login">Login here</a></p>
                    <p class="legal-links">
                        <a href="/terms" target="_blank">Terms of Service</a> • 
                        <a href="/privacy" target="_blank">Privacy Policy</a>
                    </p>
                    <p class="agreement-text">By signing up, you agree to our Terms and will complete payment after authentication</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/signup.js"></script>
</body>
</html>
