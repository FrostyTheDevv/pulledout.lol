<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/pulledout.png">
    <title>Sign Up - SawSap Security Scanner</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box fade-in">
            <div class="auth-header">
                <div class="logo">🛡️</div>
                <h1>Create Account</h1>
                <p>Start scanning for security vulnerabilities</p>
            </div>
            
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" 
                           placeholder="Choose a username" minlength="3" maxlength="30">
                    <span class="field-hint">3-30 characters, letters, numbers, - and _ only</span>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" 
                           placeholder="Choose a strong password" minlength="8">
                    <span class="field-hint">Minimum 8 characters</span>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" 
                           placeholder="Re-enter your password">
                </div>
                
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="termsCheckbox" required>
                        I agree to the <a href="/terms" target="_blank">Terms of Service</a>
                    </label>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <button type="submit" class="btn-primary" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Login here</a></p>
            </div>
        </div>
    </div>
    
    <script src="/static/js/signup.js"></script>
</body>
</html>
